<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载 - Apocalypse Longjing</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C63FF',
                        secondary: '#4A4AFF',
                        dark: '#1A1A2E',
                        light: '#F5F5F5'
                    }
                }
            }
        }
    </script>
    <style>
        .text-gradient {
            background: linear-gradient(135deg, #6C63FF, #4A4AFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .download-item {
            transition: all 0.3s ease;
        }
        
        .download-item:hover {
            transform: translateX(10px);
            background: rgba(108, 99, 255, 0.1);
        }
        
        body {
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="text-light">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-dark bg-opacity-90 backdrop-blur-lg border-b border-gray-800">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-gradient">Apocalypse Longjing</a>
            <a href="index.html" class="text-gray-400 hover:text-primary transition-colors">

                            <i class="fa fa-file-text-o"></i>
                        </div>
                        <div>
                            <h3 class="text-2xl font-bold mb-1">简历下载</h3>
                            <p class="text-gray-400 text-sm">个人履历与技能介绍</p>
                        </div>
                    </div>
                    <div class="ml-16">
                        <a href="download.html" class="download-item inline-flex items-center text-primary hover:text-secondary transition-colors">
                            <i class="fa fa-download mr-2"></i>

                        <div class="w-12 h-12 bg-primary bg-opacity-20 rounded-lg flex items-center justify-center text-primary text-xl mr-4">
                            <i class="fa fa-file-pdf-o"></i>

                        <div>
                            <h3 class="text-2xl font-bold mb-1">文档</h3>

                        </div>
                    </div>
                    <div class="ml-16 space-y-3">
                        <a href="#" class="download-item block text-gray-300 hover:text-primary transition-colors">
                            <i class="fa fa-file-text mr-2"></i>
                            <span>设计文档</span>
                        </a>
                        <a href="#" class="download-item block text-gray-300 hover:text-primary transition-colors">
                            <i class="fa fa-file-code-o mr-2"></i>
                            <span>技术文档</span>
                        </a>
                    </div>
                </div>

                <!-- 视频 -->
                <div class="bg-dark bg-opacity-50 rounded-xl border border-gray-800 p-6">
                    <div class="flex items-center mb-4">
                        <div class="w-12 h-12 bg-primary bg-opacity-20 rounded-lg flex items-center justify-center text-primary text-xl mr-4">

                        </div>
                    </div>
                    <div class="ml-16 space-y-3">
                        <a href="#" class="download-item block text-gray-300 hover:text-primary transition-colors">
                            <i class="fa fa-image mr-2"></i>
                            <span>UI 设计作品</span>
                        </a>
                        <a href="#" class="download-item block text-gray-300 hover:text-primary transition-colors">
                            <i class="fa fa-camera mr-2"></i>
                            <span>摄影作品</span>
                        </a>
                    </div>
                </div>

                <!-- 3D 模型 -->
                <div class="bg-dark bg-opacity-50 rounded-xl border border-gray-800 p-6">
                    <div class="flex items-center mb-4">
                        <div class="w-12 h-12 bg-primary bg-opacity-20 rounded-lg flex items-center justify-center text-primary text-xl mr-4">
                            <i class="fa fa-cube"></i>
                        </div>
                        <div>
                            <h3 class="text-2xl font-bold mb-1">3D 模型</h3>
                            <p class="text-gray-400 text-sm">三维设计作品</p>
                        </div>
                    </div>
                    <div class="ml-16 space-y-3">
                        <a href="model-viewer.html" class="download-item block text-gray-300 hover:text-primary transition-colors">
                            <i class="fa fa-cube mr-2"></i>
                            <span>模型文件</span>
                        </a>
                        <a href="#" class="download-item block text-gray-300 hover:text-primary transition-colors">
                            <i class="fa fa-box mr-2"></i>
                            <span>渲染作品</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- 下载说明 -->
            <div class="mt-12 bg-dark bg-opacity-50 rounded-xl border border-gray-800 p-6">
                <h4 class="text-lg font-bold mb-4 text-gradient">下载说明</h4>

                    </li>

            </div>

    <!-- 页脚 -->
    <footer class="border-t border-gray-800 py-8">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
