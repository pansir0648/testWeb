<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C63FF',
                        secondary: '#4A4AFF',
                        dark: '#1A1A2E',
                        light: '#F5F5F5',
                        accent: '#FF6584'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    }

        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary;
            }
            .bg-glass {
                @apply bg-white bg-opacity-10 backdrop-filter backdrop-blur-lg;
            }
            .transition-all-300 {
                @apply transition-all duration-300 ease-in-out;
            }
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        ::-webkit-scrollbar {
            display: none;
        }
        
        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        body > *:not(#page-transition) {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        #page-transition {
            transition: all 0.5s ease-in-out;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .content-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-dark text-light font-sans" style="opacity: 0; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);">

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
            
            const pageTransition = document.getElementById('page-transition');
            setTimeout(() => {
                pageTransition.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    pageTransition.style.display = 'none';
                }, 500);
            }, 800);
            
            setTimeout(() => {
                const mainContentElements = document.querySelectorAll('body > *:not(#page-transition)');
                mainContentElements.forEach((element, index) => {
                    setTimeout(() => {
                        element.style.opacity = '1';
                        element.style.transform = 'translateY(0)';
                    }, 100 + (index * 80));
                });
            }, 300);
            
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('bg-dark', 'bg-opacity-90', 'backdrop-blur-lg', 'shadow-lg');
                    navbar.classList.remove('bg-transparent');
                } else {
                    navbar.classList.remove('bg-dark', 'bg-opacity-90', 'backdrop-blur-lg', 'shadow-lg');
                    navbar.classList.add('bg-transparent');
                }
            });
        });
    </script>
</body>
</html>
