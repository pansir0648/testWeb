<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎 - Apocalypse Longjing</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C63FF',
                        secondary: '#4A4AFF',
                        dark: '#1A1A2E',
                        light: '#F5F5F5',
                        accent: '#FF6584'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary;
            }
            .bg-glass {
                @apply bg-white bg-opacity-10 backdrop-filter backdrop-blur-lg;
            }
            .transition-all-300 {
                @apply transition-all duration-300 ease-in-out;
            }
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            @apply bg-dark;
        }
        ::-webkit-scrollbar-thumb {
            @apply bg-primary rounded-full;
        }
        ::-webkit-scrollbar-thumb:hover {
            @apply bg-secondary;
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 背景动画 */
        body {
            background-image: url('https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/8ef4a2493f80403dab57747827ed8000~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202603042009522669BF8AF384B3BF114B&rrcfp=f06b921b&x-expires=1775218235&x-signature=3JxHlhHoH0y%2FPutNlRSLSK38NZo%3D');
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(26, 26, 46, 0.7) 100%);
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
        }
        
        /* 转场动画 */
        body.fade-out {
            opacity: 0;
        }
        
        /* 进入按钮初始状态 */
        #enter-btn {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        /* 散开动画样式 */
        .scatter-left {
            transform: translateX(-150px) !important;
            opacity: 0 !important;
        }
        
        .scatter-right {
            transform: translateX(150px) !important;
            opacity: 0 !important;
        }
        
        .scatter-up {
            transform: translateY(-100px) !important;
            opacity: 0 !important;
        }
        
        .scatter-down {
            transform: translateY(100px) !important;
            opacity: 0 !important;
        }
        
        .scatter-scale {
            transform: scale(0) !important;
            opacity: 0 !important;
        }
    </style>
</head>
<body class="bg-dark text-light font-sans min-h-screen flex items-center justify-center">
    <div class="content w-full">
        <!-- 顶部导航 -->
        <nav class="fixed top-0 left-0 right-0 z-50 bg-dark bg-opacity-80 backdrop-blur-lg py-4 px-6">
            <div class="container mx-auto flex justify-between items-center">
                <a href="#" class="text-2xl font-bold text-gradient">Apocalypse Longjing</a>
                <a href="index.html" class="text-sm text-gray-400 hover:text-primary transition-all-300">进入主页</a>
            </div>
        </nav>
        
        <!-- 主要内容 -->
        <div class="min-h-screen flex items-center">
            <div class="container mx-auto px-6 md:px-12 grid md:grid-cols-2 gap-12 items-center">
                <!-- 左侧文字内容 -->
                <div class="text-left" data-aos="fade-right">
                    <!-- 动态进入画面 -->
                    <div id="intro-screen">
                        <div class="opacity-0" id="intro-text-1">
                            <h1 class="text-5xl md:text-7xl font-bold mb-6">
                                嗨！
                            </h1>
                        </div>
                        <div class="opacity-0" id="intro-text-2">
                            <h1 class="text-5xl md:text-7xl font-bold mb-6">
                                终于见面了
                            </h1>
                        </div>
                        <div class="opacity-0" id="intro-text-3">
                            <h1 class="text-3xl md:text-5xl font-bold mb-8">
                                欢迎访问我的网站！
                            </h1>
                        </div>
                        
                        <!-- 简介内容 -->
                        <div class="opacity-0" id="intro-description">
                            <p class="text-lg text-gray-300 mb-6">
                                我是一名UI/UX设计师 & 前端开发者，致力于创造美观实用的数字体验。
                            </p>
                            <p class="text-lg text-gray-300 mb-8">
                                我的设计哲学是"以用户为中心，以解决问题为导向"，相信优秀的设计应该既能吸引眼球，又能提供无缝的用户体验。
                            </p>
                            
                            <!-- 进入主页大图形按钮 -->
                            <div id="enter-btn" class="mt-12 flex justify-end md:justify-end">
                                <button class="bg-primary hover:bg-secondary text-white w-24 h-24 rounded-full font-medium text-lg transition-all-300 transform hover:scale-110 hover:shadow-lg flex items-center justify-center opacity-0 transform translateY(50px)">
                                    <i class="fa fa-arrow-right text-2xl"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 右侧装饰元素 -->
                <div class="hidden md:block" data-aos="fade-left">
                    <div class="relative">
                        <div class="w-64 h-64 md:w-80 md:h-80 rounded-full bg-primary bg-opacity-20 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animate-pulse"></div>
                        <div class="w-48 h-48 md:w-64 md:h-64 rounded-full bg-secondary bg-opacity-20 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animate-pulse" style="animation-delay: 0.5s"></div>
                        <div class="w-32 h-32 md:w-48 md:h-48 rounded-full bg-accent bg-opacity-20 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 animate-pulse" style="animation-delay: 1s">
							<h1 align="center" class="text-3xl md font-bold mb-8"><br><br>
						    <a href="index.html"> 进入主页&nbsp;</a></h1>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // 初始化 AOS 动画库
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });
        
        // DOM 加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 显示动态进入画面
            const introText1 = document.getElementById('intro-text-1');
            const introText2 = document.getElementById('intro-text-2');
            const introText3 = document.getElementById('intro-text-3');
            const introDescription = document.getElementById('intro-description');
            
            // 第一段文字："嗨！"
            setTimeout(() => {
                introText1.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                introText1.style.opacity = '1';
                
                // 1秒后渐隐
                setTimeout(() => {
                    introText1.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                    introText1.style.opacity = '0';
                    
                    // 第二段文字："终于见面了"
                    setTimeout(() => {
                        introText2.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                        introText2.style.opacity = '1';
                        
                        // 1秒后渐隐
                        setTimeout(() => {
                            introText2.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                            introText2.style.opacity = '0';
                            
                            // 第三段文字："欢迎访问我的网站！"
                            setTimeout(() => {
                                introText3.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                                introText3.style.opacity = '1';
                                
                                // 1.5秒后显示简介内容
                                setTimeout(() => {
                                    introDescription.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                                    introDescription.style.opacity = '1';
                                    introDescription.style.transform = 'translateY(0)';
                                    
                                    // 2 秒后显示进入主页按钮（从下往上）
                                    setTimeout(() => {
                                        const enterBtn = document.querySelector('#enter-btn button');
                                        enterBtn.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                                        enterBtn.style.opacity = '1';
                                        enterBtn.style.transform = 'translateY(0)';
                                        
                                        // 标记用户已看过欢迎动画
                                        localStorage.setItem('hasSeenIntro', 'true');
                                        
                                        // 获取所有需要散开的元素
                                        const introScreen = document.getElementById('intro-screen');
                                        const text1 = document.getElementById('intro-text-1');
                                        const text2 = document.getElementById('intro-text-2');
                                        const text3 = document.getElementById('intro-text-3');
                                        const description = document.getElementById('intro-description');
                                        const decorativeElement = document.querySelector('[data-aos="fade-left"]');
                                        
                                        // 从中央向两侧平滑散开
                                        // 第一段文字向左散开
                                        setTimeout(() => {
                                            text1.classList.add('scatter-left');
                                        }, 1500);
                                        
                                        // 第二段文字向右散开
                                        setTimeout(() => {
                                            text2.classList.add('scatter-right');
                                        }, 1600);
                                        
                                        // 第三段文字向左散开
                                        setTimeout(() => {
                                            text3.classList.add('scatter-left');
                                        }, 1700);
                                        
                                        // 简介内容向右散开
                                        setTimeout(() => {
                                            description.classList.add('scatter-right');
                                        }, 1800);
                                        
                                        // 右侧装饰元素散开
                                        if (decorativeElement) {
                                            setTimeout(() => {
                                                decorativeElement.classList.add('scatter-right');
                                            }, 1700);
                                        }
                                        
                                        // 按钮缩放并消失
                                        setTimeout(() => {
                                            enterBtn.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                                            enterBtn.classList.add('scatter-scale');
                                        }, 1000);
                                        
                                        // 延迟后跳转到主页，添加转场动画
                                        setTimeout(() => {
                                            // 欢迎页面渐隐
                                            document.body.classList.add('fade-out');
                                            
                                            // 等待渐隐完成后跳转
                                            setTimeout(() => {
                                                window.location.href = 'index.html';
                                            }, 600);
                                        }, 2500);
                                    }, 2000);
                                }, 1500);
                            }, 600);
                        }, 1000);
                    }, 600);
                }, 1000);
            }, 100);
        });
    </script>
</body>
</html>
