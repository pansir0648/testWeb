<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证 - Apocalypse Longjing</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C63FF',
                        secondary: '#4A4AFF',
                        dark: '#1A1A2E',
                        light: '#F5F5F5',
                        accent: '#FF6584'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    },
                    boxShadow: {
                        'custom': '0 10px 30px -5px rgba(108, 99, 255, 0.3)',
                        'hover': '0 20px 40px -5px rgba(108, 99, 255, 0.5)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary;
            }
            .bg-glass {
                @apply bg-white bg-opacity-10 backdrop-filter backdrop-blur-lg;
            }
            .transition-all-300 {
                @apply transition-all duration-300 ease-in-out;
            }
            .card-hover {
                @apply hover:scale-105 hover:shadow-hover transition-all-300;
            }
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            @apply bg-dark;
        }
        ::-webkit-scrollbar-thumb {
            @apply bg-primary rounded-full;
        }
        ::-webkit-scrollbar-thumb:hover {
            @apply bg-secondary;
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 背景动画 */
        body {
            background-image: url('https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/8ef4a2493f80403dab57747827ed8000~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202603042009522669BF8AF384B3BF114B&rrcfp=f06b921b&x-expires=1775218235&x-signature=3JxHlhHoH0y%2FPutNlRSLSK38NZo%3D');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(26, 26, 46, 0.7) 100%);
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
        }
        
        /* 人机验证样式 */
        .captcha-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .captcha-item {
            aspect-ratio: 1;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .captcha-item:hover {
            border-color: rgba(108, 99, 255, 0.5);
        }
        .captcha-item.selected {
            border-color: #6C63FF;
            background-color: rgba(108, 99, 255, 0.2);
        }
        .captcha-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-dark text-light font-sans min-h-screen flex items-center justify-center">
    <div class="content w-full max-w-2xl px-4">
        <div class="bg-glass p-8 rounded-xl border border-gray-800" data-aos="fade-up">
            <h2 class="text-3xl font-bold mb-6 text-center">
                <span class="text-gradient">安全</span> 验证
            </h2>
            <p class="text-gray-400 mb-8 text-center">
                请完成以下验证以访问网站
            </p>
            
            <!-- 人机验证 -->
            <div class="mb-8">
                <h3 class="text-xl font-bold mb-4">人机验证</h3>
                <div class="bg-white bg-opacity-5 border border-gray-700 rounded-lg p-4 mb-4" id="captcha-container">
                    <div class="flex items-center">
                        <div class="mr-4">
                            <input type="checkbox" id="captcha-checkbox" class="w-6 h-6 border-2 border-gray-400 rounded cursor-pointer">
                        </div>
                        <div>
                            <p class="text-gray-300">我不是机器人</p>
                            <p class="text-xs text-gray-500">点击方框进行验证</p>
                        </div>
                    </div>
                </div>
                <p id="captcha-error" class="text-accent text-center hidden">
                    验证失败，请重试
                </p>
            </div>
            
            <!-- 邀请码验证 -->
            <div class="mb-8">
                <h3 class="text-xl font-bold mb-4">邀请码验证</h3>
                <div>
                    <label for="invite-code" class="block text-sm font-medium text-gray-400 mb-2">邀请码</label>
                    <input type="text" id="invite-code" name="invite-code" class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-all-300" placeholder="请输入邀请码">
                </div>
                <div class="mt-4 flex items-center">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 text-primary focus:ring-primary border-gray-700 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-400">
                        记住我（本次浏览器会话内不再验证）
                    </label>
                </div>
                <p id="invite-error" class="text-accent text-center hidden mt-2">
                    邀请码错误，请重试
                </p>
            </div>
            
            <button id="verify-btn" class="w-full bg-primary hover:bg-secondary text-white py-3 rounded-lg font-medium transition-all-300">
                验证
            </button>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // 邀请码验证
        const validInviteCode = 'PH123456'; // 请设置您的邀请码
        
        // 人机验证状态
        let captchaVerified = false;
        
        // 初始化 AOS 动画库
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });
        
        // 验证码复选框点击事件
        document.getElementById('captcha-checkbox').addEventListener('change', function() {
            if (this.checked) {
                // 模拟验证过程
                const captchaContainer = document.getElementById('captcha-container');
                captchaContainer.innerHTML = '<div class="flex items-center justify-center py-2"><i class="fa fa-spinner fa-spin text-primary mr-2"></i> 正在验证...</div>';
                
                // 模拟验证延迟
                setTimeout(() => {
                    captchaVerified = true;
                    captchaContainer.innerHTML = '<div class="flex items-center"><div class="mr-4"><div class="w-6 h-6 border-2 border-primary rounded flex items-center justify-center"><i class="fa fa-check text-primary"></i></div></div><div><p class="text-gray-300">验证成功</p><p class="text-xs text-gray-500">您已通过人机验证</p></div></div>';
                }, 1000);
            } else {
                captchaVerified = false;
                const captchaContainer = document.getElementById('captcha-container');
                captchaContainer.innerHTML = '<div class="flex items-center"><div class="mr-4"><input type="checkbox" id="captcha-checkbox" class="w-6 h-6 border-2 border-gray-400 rounded cursor-pointer"></div><div><p class="text-gray-300">我不是机器人</p><p class="text-xs text-gray-500">点击方框进行验证</p></div></div>';
                
                // 重新绑定事件
                document.getElementById('captcha-checkbox').addEventListener('change', arguments.callee);
            }
        });
        
        // 验证人机验证
        function validateCaptcha() {
            return captchaVerified;
        }
        
        // 验证邀请码
        function validateInviteCode() {
            const inviteCode = document.getElementById('invite-code').value.trim();
            return inviteCode === validInviteCode;
        }
        
        // 检查是否已验证
        window.addEventListener('DOMContentLoaded', function() {
            const isVerified = sessionStorage.getItem('verified');
            if (isVerified === 'true') {
                // 已验证，直接跳转到主页面
                window.location.href = 'index.html';
            }
        });
        
        // 验证按钮点击事件
        document.getElementById('verify-btn').addEventListener('click', function() {
            const captchaError = document.getElementById('captcha-error');
            const inviteError = document.getElementById('invite-error');
            const verificationCard = document.querySelector('.bg-glass');
            const rememberMe = document.getElementById('remember-me').checked;
            
            // 重置错误信息
            captchaError.classList.add('hidden');
            inviteError.classList.add('hidden');
            
            // 验证人机验证
            const captchaValid = validateCaptcha();
            if (!captchaValid) {
                captchaError.classList.remove('hidden');
                return;
            }
            
            // 验证邀请码
            const inviteValid = validateInviteCode();
            if (!inviteValid) {
                inviteError.classList.remove('hidden');
                return;
            }
            
            // 如果勾选了记住我，存储验证状态
            if (rememberMe) {
                sessionStorage.setItem('verified', 'true');
            }
            
            // 验证成功，添加过渡动画
            verificationCard.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
            verificationCard.style.opacity = '0';
            verificationCard.style.transform = 'scale(0.8) translateY(20px)';
            
            // 背景渐变效果
            const body = document.body;
            body.style.transition = 'background 1s ease-in-out';
            body.style.background = 'linear-gradient(135deg, #6C63FF 0%, #4A4AFF 100%)';
            
            // 延迟后跳转到欢迎页面
            setTimeout(() => {
                window.location.href = 'welcome.html';
            }, 800);
        });
        

    </script>
</body>
</html>
