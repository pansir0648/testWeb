    <script>
        // Three.js 变量
        let scene, camera, renderer, controls;

        // 初始化场景
        function initScene() {
            const canvas = document.getElementById('viewer-canvas');
            const container = document.getElementById('canvas-container');
            
            // 设置画布大小
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1A1A2E);
            scene.fog = new THREE.Fog(0x1A1A2E, 10, 50);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(
                75,
                canvas.width / canvas.height,
                0.1,
                1000
            );
            camera.position.set(3, 3, 3);
            camera.lookAt(0, 0, 0);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.width, canvas.height);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            
            // 添加灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // 添加轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 1;
            controls.maxDistance = 20;
            
            // 监听窗口大小变化
            window.addEventListener('resize', onWindowResize, false);
            
            // 开始动画循环
            animate();
        }

        // 窗口大小调整
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            const canvas = document.getElementById('viewer-canvas');
            
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            camera.aspect = canvas.width / canvas.height;
            camera.updateProjectionMatrix();
            
            renderer.setSize(canvas.width, canvas.height);
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            renderer.render(scene, camera);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 页面淡入显示
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
            
            // 页面过渡动画
            const pageTransition = document.getElementById('page-transition');
            setTimeout(() => {
                pageTransition.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    pageTransition.style.display = 'none';
                }, 500);
            }, 800);
            
            // 显示页面内容
            setTimeout(() => {
                const mainContentElements = document.querySelectorAll('body > *:not(#page-transition)');
                mainContentElements.forEach((element, index) => {
                    setTimeout(() => {
                        element.style.opacity = '1';
                        element.style.transform = 'translateY(0)';
                    }, 100 + (index * 80));
                });
            }, 300);
            
            // 初始化 AOS 动画库
            AOS.init({
                duration: 800,
                once: true,
                offset: 100
            });
            
            // 导航栏滚动效果
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('bg-dark', 'bg-opacity-90', 'backdrop-blur-lg', 'shadow-lg');
                    navbar.classList.remove('bg-transparent');
                } else {
                    navbar.classList.remove('bg-dark', 'bg-opacity-90', 'backdrop-blur-lg', 'shadow-lg');
                    navbar.classList.add('bg-transparent');
                }
            });
            
            // 移动端菜单
            const menuToggle = document.getElementById('menu-toggle');
            const mobileMenu = document.getElementById('mobile-menu');
            
            menuToggle.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
            });
            
            // 初始化 3D 场景
            initScene();
            
            // 清空模型列表
            const grid = document.getElementById('models-grid');
            grid.innerHTML = '<div class="col-span-2 text-center py-16 text-gray-500">暂无模型</div>';
            
            // 清空分类计数
            document.querySelectorAll('.category-count').forEach(count => {
                count.textContent = '0';
            });
        });
    </script>
</body>
