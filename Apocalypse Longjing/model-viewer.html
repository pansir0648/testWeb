<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型下载 - Apocalypse Longjing</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C63FF',
                        secondary: '#4A4AFF',
                        dark: '#1A1A2E',
                        light: '#F5F5F5',
                        accent: '#FF6584'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    },
                    boxShadow: {
                        'custom': '0 10px 30px -5px rgba(108, 99, 255, 0.3)',
                        'hover': '0 20px 40px -5px rgba(108, 99, 255, 0.5)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary;
            }
            .bg-glass {
                @apply bg-white bg-opacity-10 backdrop-filter backdrop-blur-lg;
            }
            .transition-all-300 {
                @apply transition-all duration-300 ease-in-out;
            }
            .transition-all-500 {
                @apply transition-all duration-500 ease-in-out;
            }
            .card-hover {
                @apply hover:scale-105 hover:shadow-hover transition-all-300;
            }
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
        
        html {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* 加载动画 */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        
        /* 页面内容初始状态 */
        body > *:not(#page-transition) {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        /* 页面过渡动画 */
        #page-transition {
            transition: all 0.5s ease-in-out;
        }
        
        /* 模型卡片样式 */
        .model-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 0.75rem;
            border: 1px solid #374151;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        
        .model-card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px -5px rgba(108, 99, 255, 0.5);
        }
        
        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 0.75rem;
            border: 1px solid #374151;
            width: 100%;
            max-width: 56rem;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        
        /* 图片预览样式 */
        .image-preview-overlay {
            position: fixed;
            inset: 0;
            z-index: 70;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(4px);
        }
        
        .image-preview-content {
            position: relative;
            max-width: 80vw;
            max-height: 90vh;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 0.75rem;
            border: 1px solid #374151;
        }
        
        .preview-main {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        
        .preview-main img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }
        
        .preview-thumbnails {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 1rem;
        }
        
        .thumbnail-item {
            width: 5rem;
            height: 5rem;
            background: rgba(26, 26, 46, 0.8);
            border-radius: 0.5rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
        }
        
        .thumbnail-item:hover {
            transform: translateY(-2px);
        }
        
        .thumbnail-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #close-image-preview {
            position: fixed !important;
            top: 20px !important;
            right: 20px !important;
            z-index: 1000 !important;
        }
        
    </style>
</head>

    <!-- 主容器 -->
    <div class="main-container container mx-auto px-4 pt-24 pb-12" data-aos="fade-up">
        <!-- 页面标题 -->
        <div class="text-center mb-12" data-aos="fade-up">

        <!-- 分类筛选 -->
        <div class="category-filter mb-8" data-aos="fade-up" data-aos-delay="100">

                <button class="category-btn px-6 py-3 bg-glass border border-gray-700 rounded-lg hover:border-primary text-gray-300 hover:text-primary transition-all-300 active" data-category="all">

                <button class="category-btn px-6 py-3 bg-glass border border-gray-700 rounded-lg hover:border-primary text-gray-300 hover:text-primary transition-all-300" data-category="character">

        <!-- 模型网格 -->

    <!-- 模型详细信息模态框 -->

                <!-- 下载按钮 -->

                    <a id="modal-download-image-link" href="" class="inline-block px-8 py-4 bg-secondary hover:bg-primary text-white font-bold rounded-lg transition-all-300 shadow-custom hover:shadow-hover" style="display: none;">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-gray-400">

    <!-- 图片预览 -->
    <div id="image-preview" class="image-preview-overlay" style="display: none;">
        <div class="image-preview-content">
            <div class="preview-header flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gradient">模型预览</h3>
                <button id="close-image-preview" class="w-10 h-10 flex items-center justify-center rounded-full bg-dark bg-opacity-50 hover:bg-opacity-70 text-gray-400 hover:text-white transition-all-300 transform hover:scale-110">

                <img id="preview-image" src="" alt="模型预览" class="w-full h-80 object-contain bg-dark rounded-lg">
            </div>

                <!-- 缩略图将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 模型数据
        const modelsData = [
            {
                id: 1,
                name: "宝剑模型",
                path: "xiazai/Model/宝剑/宝剑.fbx",
                image: "xiazai/Model/宝剑/01.png",
                images: [
                    "xiazai/Model/宝剑/01.png",
                    "xiazai/Model/宝剑/02.png",
                    "xiazai/Model/宝剑/03.png"
                ],
                type: "object",
                format: "fbx",
                description: "宝剑模型，分类为日常物品"
            },
            {
                id: 2,
                name: "爱国者u盘",
                path: "xiazai/Model/爱国者u盘.fbx",
                image: "xiazai/image/爱国者u盘.png",
                images: [
                    "xiazai/image/爱国者u盘.png"
                ],
                type: "object",
                format: "fbx",
                description: "爱国者u盘模型，分类为日常物品"
            }
        ];

        // 生成模型列表
        function generateModelList(filteredModels = modelsData) {
            const grid = document.getElementById('models-grid');
            grid.innerHTML = '';
            
            if (filteredModels.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-16 text-gray-500">暂无模型</div>';
                return;
            }
            
            filteredModels.forEach(model => {
                const modelCard = document.createElement('div');
                modelCard.className = 'model-card';
                modelCard.dataset.id = model.id;
                modelCard.dataset.type = model.type;
                
                modelCard.innerHTML = `
                    <div class="h-48 bg-dark flex items-center justify-center p-4">
                        <img src="${model.image || 'https://via.placeholder.com/400x300?text=No+Image'}" alt="${model.name}" class="max-w-full max-h-full object-contain">
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-medium mb-2">${model.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-400">${model.format.toUpperCase()}</span>
                            <span class="text-xs text-gray-500">${getCategoryName(model.type)}</span>
                        </div>
                    </div>
                `;
                
                modelCard.addEventListener('click', () => {
                    openModelModal(model);
                });
                
                grid.appendChild(modelCard);
            });
        }

        // 获取分类名称
        function getCategoryName(type) {
            const categories = {
                'character': '人物角色',
                'object': '日常物品',
                'vehicle': '交通工具',
                'architecture': '建筑结构'
            };
            return categories[type] || '其他';
        }

        // 打开模型模态框
        function openModelModal(model) {
            const modal = document.getElementById('model-modal');
            const modelName = document.getElementById('modal-model-name');
            const modelImage = document.getElementById('modal-model-image');
            const downloadLink = document.getElementById('modal-download-link');
            const modelFormat = document.getElementById('modal-model-format');
            const modelCategory = document.getElementById('modal-model-category');
            
            modelName.textContent = model.name;
            modelImage.src = model.image || 'https://via.placeholder.com/400x300?text=No+Image';
            downloadLink.href = model.path;
            downloadLink.setAttribute('download', '');
            downloadLink.setAttribute('target', '_blank');
            modelFormat.textContent = model.format.toUpperCase();
            modelCategory.textContent = getCategoryName(model.type);
            
            // 处理下载产品图片按钮
            const downloadImageLink = document.getElementById('modal-download-image-link');
            if (model.name.includes('爱国者u盘')) {
                // 显示下载产品图片按钮
                downloadImageLink.style.display = 'inline-block';
                // 设置下载链接
                downloadImageLink.href = model.image;
                downloadImageLink.setAttribute('download', '');
                downloadImageLink.setAttribute('target', '_blank');
            } else {
                // 隐藏下载产品图片按钮
                downloadImageLink.style.display = 'none';
            }
            
            // 添加点击放大事件
            modelImage.addEventListener('click', function() {
                openImagePreview(model);
            });
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // 禁止背景滚动
        }

        // 关闭模型模态框
        function closeModelModal() {
            const modal = document.getElementById('model-modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // 恢复背景滚动
        }

        // 打开图片预览
        function openImagePreview(model) {
            const preview = document.getElementById('image-preview');
            const previewImage = document.getElementById('preview-image');
            const thumbnailsContainer = document.querySelector('.preview-thumbnails');
            
            // 清空缩略图容器
            thumbnailsContainer.innerHTML = '';
            
            // 先设置主图片源，等加载完成后再显示
            previewImage.src = model.image || 'https://via.placeholder.com/400x300?text=No+Image';
            
            // 直接显示预览，不需要等待图片加载
            preview.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // 禁止背景滚动
            
            // 生成缩略图
            const images = model.images || [model.image];
            images.forEach((imgUrl, index) => {
                const thumbnailItem = document.createElement('div');
                thumbnailItem.className = `thumbnail-item w-24 h-24 bg-dark rounded-lg overflow-hidden cursor-pointer border-2 ${index === 0 ? 'border-primary' : 'border-transparent hover:border-primary/50'}`;
                
                const thumbnailImg = document.createElement('img');
                thumbnailImg.src = imgUrl;
                thumbnailImg.alt = `缩略图 ${index + 1}`;
                thumbnailImg.className = 'w-full h-full object-cover';
                
                // 点击缩略图切换主图片
                thumbnailItem.addEventListener('click', function() {
                    previewImage.src = imgUrl;
                    // 更新缩略图选中状态
                    document.querySelectorAll('.thumbnail-item').forEach((item, i) => {
                        item.className = `thumbnail-item w-24 h-24 bg-dark rounded-lg overflow-hidden cursor-pointer border-2 ${i === index ? 'border-primary' : 'border-transparent hover:border-primary/50'}`;
                    });
                });
                
                thumbnailItem.appendChild(thumbnailImg);
                thumbnailsContainer.appendChild(thumbnailItem);
            });
        }

        // 关闭图片预览
        function closeImagePreview() {
            const preview = document.getElementById('image-preview');
            const previewImage = document.getElementById('preview-image');
            
            preview.style.display = 'none';
            previewImage.src = ''; // 清空图片源
            document.body.style.overflow = 'auto'; // 恢复背景滚动
        }

        // 筛选模型
        function filterModels(category) {
            let filteredModels;
            if (category === 'all') {
                filteredModels = modelsData;
            } else {
                filteredModels = modelsData.filter(model => model.type === category);
            }
            generateModelList(filteredModels);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 页面淡入显示
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
            
            // 页面过渡动画
            const pageTransition = document.getElementById('page-transition');
            setTimeout(() => {
                pageTransition.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    pageTransition.style.display = 'none';
                }, 500);
            }, 800);
            
            // 显示页面内容
            setTimeout(() => {
                const mainContentElements = document.querySelectorAll('body > *:not(#page-transition)');
                mainContentElements.forEach((element, index) => {
                    setTimeout(() => {
                        element.style.opacity = '1';
                        element.style.transform = 'translateY(0)';
                    }, 100 + (index * 80));
                });
            }, 300);
            
            // 初始化 AOS 动画库
            AOS.init({
                duration: 800,
                once: true,
                offset: 100
            });
            
            // 导航栏滚动效果
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('bg-dark', 'bg-opacity-90', 'backdrop-blur-lg', 'shadow-lg');
                    navbar.classList.remove('bg-transparent');
                } else {
                    navbar.classList.remove('bg-dark', 'bg-opacity-90', 'backdrop-blur-lg', 'shadow-lg');
                    navbar.classList.add('bg-transparent');
                }
            });
            
            // 移动端菜单
            const menuToggle = document.getElementById('menu-toggle');
            const mobileMenu = document.getElementById('mobile-menu');
            
            menuToggle.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
            });
            
            // 生成模型列表
            generateModelList();
            
            // 分类筛选事件
            const categoryButtons = document.querySelectorAll('.category-btn');
            categoryButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // 移除所有按钮的 active 类
                    categoryButtons.forEach(btn => btn.classList.remove('active', 'border-primary', 'text-primary'));
                    // 添加当前按钮的 active 类
                    this.classList.add('active', 'border-primary', 'text-primary');
                    // 筛选模型
                    const category = this.dataset.category;
                    filterModels(category);
                });
            });
            
            // 直接绑定关闭按钮事件
            const closeModalBtn = document.getElementById('close-modal');
            const closeImagePreviewBtn = document.getElementById('close-image-preview');
            const modelModal = document.getElementById('model-modal');
            const imagePreview = document.getElementById('image-preview');
            
            if (closeModalBtn) {
                closeModalBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    closeModelModal();
                    return false;
                });
            }
            
            if (closeImagePreviewBtn) {
                closeImagePreviewBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    closeImagePreview();
                    return false;
                });
            }
            
            // 点击模态框外部关闭
            if (modelModal) {
                modelModal.addEventListener('click', function(e) {
                    if (e.target === this) {
                        closeModelModal();
                    }
                });
            }
            
            // 点击图片预览外部关闭
            if (imagePreview) {
                imagePreview.addEventListener('click', function(e) {
                    if (e.target === this) {
                        closeImagePreview();
                    }
                });
            }
            
            // ESC 键关闭模态框
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeImagePreview();
                    closeModelModal();
                }
            });
        });
    </script>
</body>
</html>
