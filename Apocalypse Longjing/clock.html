<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时钟屏保 - Apocalypse Longjing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C63FF',
                        secondary: '#4A4AFF',
                        dark: '#1A1A2E',
                        light: '#F5F5F5'
                    }
                }
            }
        }
    </script>
    <style>
        .text-gradient {
            background: linear-gradient(135deg, #6C63FF, #4A4AFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* 背景动画星星 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* 时钟样式 */
        .clock-container {
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .clock-container.show {
            opacity: 1;
            transform: scale(1);
        }
        
        .digital-clock {
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(108, 99, 255, 0.5),
                         0 0 40px rgba(108, 99, 255, 0.3),
                         0 0 60px rgba(108, 99, 255, 0.2);
        }
        
        .seconds {
            font-size: 0.5em;
            color: #6C63FF;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            transition: all 0.3s ease;
            opacity: 0;
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(108, 99, 255, 0.3);
            color: #aaa;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-btn.show {
            opacity: 1;
        }
        
        .back-btn:hover {
            transform: translateX(-50%) scale(1.05);
            color: #ddd;
            background: rgba(26, 26, 46, 0.8);
            border-color: rgba(108, 99, 255, 0.6);
        }
    </style>
</head>
<body class="flex items-center justify-center">
    <!-- 背景星星 -->
    <div class="stars" id="stars"></div>
    
    <!-- 时钟容器 -->
    <div class="clock-container" id="clock-container">
        <!-- 日期显示 -->
        <div id="date" class="text-gray-400 text-xl md:text-2xl mb-4 tracking-wider"></div>
        
        <!-- 数字时钟 -->
        <div class="digital-clock text-7xl md:text-9xl font-bold text-white">
            <span id="time">00:00</span>
            <span class="seconds" id="seconds">00</span>
        </div>
    </div>
    
    <!-- 返回按钮 -->
    <a href="index.html" class="back-btn" id="back-btn">
        <i class="fa fa-arrow-left mr-2"></i>
        <span>返回首页</span>
    </a>

    <script>
        // 创建背景星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            
            // 更新时间
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('time').textContent = `${hours}:${minutes}`;
            document.getElementById('seconds').textContent = seconds;
            
            // 更新日期
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                weekday: 'long' 
            };
            const dateStr = now.toLocaleDateString('zh-CN', options);
            document.getElementById('date').textContent = dateStr;
        }
        
        // 页面加载动画
        function initPage() {
            const clockContainer = document.getElementById('clock-container');
            const backBtn = document.getElementById('back-btn');
            
            // 显示时钟容器
            setTimeout(() => {
                clockContainer.classList.add('show');
            }, 100);
            
            // 显示返回按钮
            setTimeout(() => {
                backBtn.classList.add('show');
            }, 500);
        }
        
        // 返回按钮转场动画
        function initBackButton() {
            const backBtn = document.getElementById('back-btn');
            if (backBtn) {
                backBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // 时钟渐隐
                    const clockContainer = document.getElementById('clock-container');
                    clockContainer.classList.remove('show');
                    backBtn.classList.remove('show');
                    
                    // 延迟后返回主页
                    setTimeout(() => {
                        window.location.href = this.href;
                    }, 600);
                });
            }
        }
        
        // 初始化
        createStars();
        updateTime();
        setInterval(updateTime, 1000);
        initPage();
        initBackButton();
    </script>
</body>
</html>
