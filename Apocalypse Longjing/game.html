<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的世界 - Apocalypse Longjing</title>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background: #000;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* UI 覆盖层 */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* 状态栏 */
        #status-bar {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        
        .status-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .status-label {
            color: white;
            font-size: 12px;
            text-shadow: 2px 2px 0 #000;
        }
        
        .status-bar {
            display: flex;
            gap: 2px;
        }
        
        .status-slot {
            width: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
        }
        
        .status-slot.filled.health {
            background: #ff3333;
            box-shadow: 0 0 5px #ff3333;
        }
        
        .status-slot.filled.hunger {
            background: #ff9933;
            box-shadow: 0 0 5px #ff9933;
        }
        
        /* 物品栏 */
        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px;
            border-radius: 5px;
            pointer-events: auto;
        }
        
        .hotbar-slot {
            width: 50px;
            height: 50px;
            background: rgba(139, 139, 139, 0.5);
            border: 3px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .hotbar-slot:hover {
            border-color: #888;
        }
        
        .hotbar-slot.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .hotbar-slot .slot-number {
            position: absolute;
            top: 2px;
            left: 4px;
            color: white;
            font-size: 10px;
            text-shadow: 1px 1px 0 #000;
        }
        
        .hotbar-slot .item-icon {
            width: 32px;
            height: 32px;
            image-rendering: pixelated;
        }
        
        /* 设置按钮 */
        #settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #555;
            color: white;
            font-size: 20px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        #settings-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: #888;
        }
        
        /* 设置菜单 */
        #settings-menu {
            position: absolute;
            top: 70px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #555;
            border-radius: 5px;
            padding: 10px;
            min-width: 200px;
            pointer-events: auto;
            display: none;
            z-index: 1000;
        }
        
        #settings-menu.show {
            display: block;
        }
        
        .settings-item {
            padding: 10px;
            color: white;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: all 0.2s;
        }
        
        .settings-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .settings-item:last-child {
            border-bottom: none;
        }
        
        .settings-item i {
            margin-right: 10px;
            width: 20px;
        }
        
        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }
        
        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        
        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        
        #crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }
        
        /* 昼夜指示器 */
        #time-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 0 #000;
            pointer-events: auto;
        }
        
        /* 游戏说明 */
        #game-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 0 #000;
            text-align: center;
            pointer-events: auto;
        }
        
        /* 暂停菜单 */
        #pause-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
            z-index: 2000;
        }
        
        #pause-menu.show {
            display: flex;
        }
        
        #pause-menu h2 {
            color: white;
            font-size: 48px;
            text-shadow: 4px 4px 0 #000;
        }
        
        .pause-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #6C63FF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }
        
        .pause-btn:hover {
            background: #4A4AFF;
            transform: scale(1.05);
        }
        
        /* 加载界面 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
        }
        
        #loading-screen.hidden {
            display: none;
        }
        
        .loading-text {
            color: white;
            font-size: 24px;
            margin-top: 20px;
        }
        
        .loading-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .loading-progress {
            width: 0%;
            height: 100%;
            background: #6C63FF;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div id="loading-screen">
        <div style="font-size: 48px;">⛏️</div>
        <div class="loading-text">加载世界中...</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loading-progress"></div>
        </div>
    </div>
    
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-overlay">
            <!-- 游戏信息 -->
            <div id="game-info">
                WASD 移动 | 鼠标中键旋转视角 | 1-4 选择物品 | ESC 暂停
            </div>
            
            <!-- 昼夜指示器 -->
            <div id="time-indicator">
                <span id="time-icon">☀️</span>
                <span id="time-text"> 白天</span>
            </div>
            
            <!-- 设置按钮 -->
            <button id="settings-btn">⚙️</button>
            
            <!-- 设置菜单 -->
            <div id="settings-menu">
                <div class="settings-item" id="reset-world">
                    <span style="margin-right: 10px;">🔄</span>重置主世界
                </div>
                <div class="settings-item" id="lock-status">
                    <span style="margin-right: 10px;">🔒</span>锁定饱食度和生命值
                </div>
                <div class="settings-item" id="toggle-daynight">
                    <span style="margin-right: 10px;">🌙</span>暂停昼夜更替
                </div>
                <div class="settings-item" id="exit-game">
                    <span style="margin-right: 10px;">🚪</span>退出游戏
                </div>
            </div>
            
            <!-- 准星 -->
            <div id="crosshair"></div>
            
            <!-- 状态栏 -->
            <div id="status-bar">
                <div class="status-group">
                    <div class="status-label">❤️ 生命值</div>
                    <div class="status-bar" id="health-bar">
                        <!-- 10 个血条格子 -->
                    </div>
                </div>
                <div class="status-group">
                    <div class="status-label">🍖 饱食度</div>
                    <div class="status-bar" id="hunger-bar">
                        <!-- 10 个饱食度格子 -->
                    </div>
                </div>
            </div>
            
            <!-- 物品栏 -->
            <div id="hotbar">
                <!-- 4 个物品槽 -->
            </div>
        </div>
        
        <!-- 暂停菜单 -->
        <div id="pause-menu">
            <h2>游戏暂停</h2>
            <button class="pause-btn" id="resume-btn">继续游戏</button>
            <button class="pause-btn" id="exit-btn">退出游戏</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const CONFIG = {
            chunkSize: 16,
            blockSize: 1,
            playerSpeed: 0.15,
            mouseSensitivity: 0.002,
            hungerDecayInterval: 30000, // 30 秒
            dayNightCycle: 60000, // 60 秒一个周期
            maxHealth: 10,
            maxHunger: 10
        };

        // 游戏状态
        let gameState = {
            health: 10,
            hunger: 10,
            selectedSlot: 0,
            isPaused: false,
            isLocked: false,
            dayNightPaused: false,
            time: 0.5, // 0-1, 0.5 为正午
            entities: [],
            trees: []
        };

        // 玩家状态
        let player = {
            x: CONFIG.chunkSize / 2,
            y: 1,
            z: CONFIG.chunkSize / 2,
            rotation: 0,
            pitch: 0,
            velocity: { x: 0, y: 0, z: 0 }
        };

        // 按键状态
        let keys = {
            w: false,
            a: false,
            s: false,
            d: false
        };

        // 物品类型
        const ITEMS = [
            { name: '草方块', color: '#567d46' },
            { name: '沙子', color: '#c2b280' },
            { name: '玻璃', color: '#a8d5e5' },
            { name: '木头', color: '#8b5a2b' }
        ];

        // 生物类型
        const MOBS = {
            pig: { name: '猪', color: '#ffb6c1', health: 3, drops: '猪肉' },
            sheep: { name: '羊', color: '#ffffff', health: 3, drops: '羊肉' }
        };

        // Three.js 变量
        let scene, camera, renderer;
        let playerMesh, groundMesh;
        let blocks = [];
        let mobs = [];
        let lastTime = 0;
        let hungerTimer = 0;
        let sunLight;

        // 初始化游戏
        function init() {
            // 模拟加载进度
            let progress = 0;
            const loadingInterval = setInterval(() => {
                progress += 10;
                document.getElementById('loading-progress').style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(loadingInterval);
                    setTimeout(() => {
                        document.getElementById('loading-screen').classList.add('hidden');
                        initThree();
                        initWorld();
                        initUI();
                        initControls();
                        generateWorld();
                        animate(0);
                        
                        // 饱食度衰减
                        setInterval(() => {
                            if (!gameState.isPaused && !gameState.isLocked) {
                                decreaseHunger();
                            }
                        }, CONFIG.hungerDecayInterval);
                    }, 500);
                }
            }, 100);
        }

        // 初始化 Three.js
        function initThree() {
            const canvas = document.getElementById('game-canvas');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 10, 50);

            camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );

            renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            // 环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // 方向光（太阳）
            sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(50, 100, 50);
            sunLight.castShadow = true;
            scene.add(sunLight);
        }

        // 初始化世界
        function initWorld() {
            // 创建地面
            const groundGeometry = new THREE.PlaneGeometry(
                CONFIG.chunkSize,
                CONFIG.chunkSize
            );
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x567d46,
                side: THREE.DoubleSide
            });
            groundMesh = new THREE.Mesh(groundGeometry, groundMaterial);
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.position.set(
                CONFIG.chunkSize / 2,
                0,
                CONFIG.chunkSize / 2
            );
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            // 创建玩家
            const playerGeometry = new THREE.BoxGeometry(0.6, 1.8, 0.6);
            const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x3366cc });
            playerMesh = new THREE.Mesh(playerGeometry, playerMaterial);
            playerMesh.position.set(player.x, player.y + 0.9, player.z);
            playerMesh.castShadow = true;
            scene.add(playerMesh);
        }

        // 生成世界
        function generateWorld() {
            // 清理现有实体
            blocks.forEach(block => scene.remove(block));
            mobs.forEach(mob => scene.remove(mob.mesh));
            blocks = [];
            mobs = [];
            gameState.entities = [];
            gameState.trees = [];

            // 生成树木
            const treeCount = 8;
            for (let i = 0; i < treeCount; i++) {
                const x = Math.random() * (CONFIG.chunkSize - 2) + 1;
                const z = Math.random() * (CONFIG.chunkSize - 2) + 1;
                generateTree(x, z);
            }

            // 生成生物
            const mobCount = 5;
            const mobTypes = Object.keys(MOBS);
            for (let i = 0; i < mobCount; i++) {
                const type = mobTypes[Math.floor(Math.random() * mobTypes.length)];
                const x = Math.random() * (CONFIG.chunkSize - 2) + 1;
                const z = Math.random() * (CONFIG.chunkSize - 2) + 1;
                spawnMob(type, x, z);
            }
        }

        // 生成树木
        function generateTree(x, z) {
            const trunkHeight = 3 + Math.floor(Math.random() * 2);
            
            // 树干
            for (let y = 0; y < trunkHeight; y++) {
                const block = createBlock(0x8b5a2b, x, y, z);
                blocks.push(block);
            }
            
            // 树叶
            const leafStart = trunkHeight;
            for (let y = leafStart; y < leafStart + 2; y++) {
                const radius = y === leafStart ? 2 : 1;
                for (let dx = -radius; dx <= radius; dx++) {
                    for (let dz = -radius; dz <= radius; dz++) {
                        if (Math.abs(dx) + Math.abs(dz) <= radius + 1) {
                            const block = createBlock(0x228b22, x + dx, y, z + dz);
                            blocks.push(block);
                        }
                    }
                }
            }
            
            gameState.trees.push({ x, z });
        }

        // 生成生物
        function spawnMob(type, x, z) {
            const mobData = MOBS[type];
            const geometry = new THREE.BoxGeometry(0.8, 0.8, 1.2);
            const material = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color(mobData.color)
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, 0.4, z);
            mesh.castShadow = true;
            scene.add(mesh);

            const mob = {
                type,
                mesh,
                health: mobData.health,
                maxHealth: mobData.health,
                x,
                z,
                velocity: { x: 0, z: 0 }
            };
            mobs.push(mob);
            gameState.entities.push(mob);
        }

        // 创建方块
        function createBlock(color, x, y, z) {
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color });
            const block = new THREE.Mesh(geometry, material);
            block.position.set(x + 0.5, y + 0.5, z + 0.5);
            block.castShadow = true;
            block.receiveShadow = true;
            scene.add(block);
            return block;
        }

        // 初始化 UI
        function initUI() {
            // 初始化血条
            const healthBar = document.getElementById('health-bar');
            for (let i = 0; i < CONFIG.maxHealth; i++) {
                const slot = document.createElement('div');
                slot.className = 'status-slot filled health';
                healthBar.appendChild(slot);
            }

            // 初始化饱食度
            const hungerBar = document.getElementById('hunger-bar');
            for (let i = 0; i < CONFIG.maxHunger; i++) {
                const slot = document.createElement('div');
                slot.className = 'status-slot filled hunger';
                hungerBar.appendChild(slot);
            }

            // 初始化物品栏
            const hotbar = document.getElementById('hotbar');
            ITEMS.forEach((item, index) => {
                const slot = document.createElement('div');
                slot.className = 'hotbar-slot' + (index === 0 ? ' active' : '');
                slot.innerHTML = `
                    <span class="slot-number">${index + 1}</span>
                    <div class="item-icon" style="background: ${item.color}; width: 24px; height: 24px; border: 2px solid rgba(0,0,0,0.3);"></div>
                `;
                slot.addEventListener('click', () => selectSlot(index));
                hotbar.appendChild(slot);
            });
        }

        // 初始化控制
        function initControls() {
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (keys.hasOwnProperty(key)) {
                    keys[key] = true;
                }
                
                // 物品栏选择
                if (e.key >= '1' && e.key <= '4') {
                    selectSlot(parseInt(e.key) - 1);
                }
                
                // ESC 暂停
                if (e.key === 'Escape') {
                    togglePause();
                }
            });

            document.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (keys.hasOwnProperty(key)) {
                    keys[key] = false;
                }
            });

            // 鼠标中键控制视角
            let isDragging = false;
            let lastMouseX = 0;
            let lastMouseY = 0;

            document.addEventListener('mousedown', (e) => {
                if (e.button === 1) { // 鼠标中键
                    isDragging = true;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    e.preventDefault();
                }
            });

            document.addEventListener('mouseup', (e) => {
                if (e.button === 1) {
                    isDragging = false;
                }
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging && !gameState.isPaused) {
                    const deltaX = e.clientX - lastMouseX;
                    const deltaY = e.clientY - lastMouseY;
                    
                    player.rotation -= deltaX * CONFIG.mouseSensitivity;
                    player.pitch = Math.max(
                        -Math.PI / 3,
                        Math.min(Math.PI / 3, player.pitch - deltaY * CONFIG.mouseSensitivity)
                    );
                    
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                }
            });

            // 设置菜单
            const settingsBtn = document.getElementById('settings-btn');
            const settingsMenu = document.getElementById('settings-menu');
            
            settingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                settingsMenu.classList.toggle('show');
            });

            document.addEventListener('click', () => {
                settingsMenu.classList.remove('show');
            });

            // 设置选项
            document.getElementById('reset-world').addEventListener('click', resetWorld);
            document.getElementById('lock-status').addEventListener('click', toggleLock);
            document.getElementById('toggle-daynight').addEventListener('click', toggleDayNight);
            document.getElementById('exit-game').addEventListener('click', exitGame);

            // 暂停菜单
            document.getElementById('resume-btn').addEventListener('click', togglePause);
            document.getElementById('exit-btn').addEventListener('click', exitGame);
        }

        // 选择物品栏
        function selectSlot(index) {
            gameState.selectedSlot = index;
            document.querySelectorAll('.hotbar-slot').forEach((slot, i) => {
                slot.classList.toggle('active', i === index);
            });
        }

        // 更新玩家位置
        function updatePlayer() {
            if (gameState.isPaused) return;

            const speed = CONFIG.playerSpeed;
            const direction = player.rotation;

            if (keys.w) {
                player.x -= Math.sin(direction) * speed;
                player.z -= Math.cos(direction) * speed;
            }
            if (keys.s) {
                player.x += Math.sin(direction) * speed;
                player.z += Math.cos(direction) * speed;
            }
            if (keys.a) {
                player.x -= Math.sin(direction + Math.PI / 2) * speed;
                player.z -= Math.cos(direction + Math.PI / 2) * speed;
            }
            if (keys.d) {
                player.x += Math.sin(direction + Math.PI / 2) * speed;
                player.z += Math.cos(direction + Math.PI / 2) * speed;
            }

            // 边界检查
            player.x = Math.max(0.5, Math.min(CONFIG.chunkSize - 0.5, player.x));
            player.z = Math.max(0.5, Math.min(CONFIG.chunkSize - 0.5, player.z));

            // 更新玩家模型位置
            playerMesh.position.set(player.x, player.y + 0.9, player.z);

            // 更新相机位置（第三人称）
            const cameraDistance = 5;
            const cameraHeight = 3;
            camera.position.x = player.x + Math.sin(player.rotation) * cameraDistance;
            camera.position.z = player.z + Math.cos(player.rotation) * cameraDistance;
            camera.position.y = player.y + cameraHeight;
            camera.lookAt(player.x, player.y + 1.5, player.z);
        }

        // 更新生物 AI
        function updateMobs() {
            if (gameState.isPaused) return;

            mobs.forEach((mob, index) => {
                // 随机移动
                if (Math.random() < 0.02) {
                    mob.velocity.x = (Math.random() - 0.5) * 0.05;
                    mob.velocity.z = (Math.random() - 0.5) * 0.05;
                }

                // 应用速度
                mob.x += mob.velocity.x;
                mob.z += mob.velocity.z;

                // 边界检查
                mob.x = Math.max(0.5, Math.min(CONFIG.chunkSize - 0.5, mob.x));
                mob.z = Math.max(0.5, Math.min(CONFIG.chunkSize - 0.5, mob.z));

                // 更新位置
                mob.mesh.position.x = mob.x;
                mob.mesh.position.z = mob.z;

                // 面向移动方向
                if (Math.abs(mob.velocity.x) > 0.01 || Math.abs(mob.velocity.z) > 0.01) {
                    mob.mesh.rotation.y = Math.atan2(mob.velocity.x, mob.velocity.z);
                }
            });
        }

        // 更新昼夜循环
        function updateDayNight(deltaTime) {
            if (gameState.isPaused || gameState.dayNightPaused) return;

            gameState.time += deltaTime / CONFIG.dayNightCycle;
            if (gameState.time > 1) gameState.time = 0;

            // 更新天空颜色
            const skyColor = new THREE.Color();
            if (gameState.time < 0.25 || gameState.time > 0.75) {
                // 夜晚
                skyColor.setHex(0x0a0a2a);
                document.getElementById('time-text').textContent = '夜晚';
                document.getElementById('time-icon').textContent = '🌙';
            } else if (gameState.time < 0.3 || gameState.time > 0.7) {
                // 黄昏/黎明
                skyColor.setHex(0xff6b35);
                document.getElementById('time-text').textContent = '黄昏';
                document.getElementById('time-icon').textContent = '🌅';
            } else {
                // 白天
                skyColor.setHex(0x87ceeb);
                document.getElementById('time-text').textContent = '白天';
                document.getElementById('time-icon').textContent = '☀️';
            }
            scene.background = skyColor;
            scene.fog.color = skyColor;

            // 更新光照
            if (sunLight) {
                const angle = gameState.time * Math.PI * 2;
                sunLight.position.x = Math.sin(angle) * 100;
                sunLight.position.y = Math.cos(angle) * 100;
            }
        }

        // 减少饱食度
        function decreaseHunger() {
            if (gameState.hunger > 0) {
                gameState.hunger--;
                updateStatusBars();
                
                // 如果饱食度为 0，减少生命值
                if (gameState.hunger === 0 && gameState.health > 0) {
                    gameState.health--;
                    updateStatusBars();
                }
            }
        }

        // 更新状态栏
        function updateStatusBars() {
            const healthSlots = document.querySelectorAll('#health-bar .status-slot');
            const hungerSlots = document.querySelectorAll('#hunger-bar .status-slot');

            healthSlots.forEach((slot, i) => {
                slot.classList.toggle('filled', i < gameState.health);
            });

            hungerSlots.forEach((slot, i) => {
                slot.classList.toggle('filled', i < gameState.hunger);
            });
        }

        // 重置世界
        function resetWorld() {
            gameState.health = CONFIG.maxHealth;
            gameState.hunger = CONFIG.maxHunger;
            player.x = CONFIG.chunkSize / 2;
            player.z = CONFIG.chunkSize / 2;
            player.rotation = 0;
            generateWorld();
            updateStatusBars();
            document.getElementById('settings-menu').classList.remove('show');
        }

        // 锁定状态
        function toggleLock() {
            gameState.isLocked = !gameState.isLocked;
            document.getElementById('settings-menu').classList.remove('show');
        }

        // 暂停昼夜
        function toggleDayNight() {
            gameState.dayNightPaused = !gameState.dayNightPaused;
            document.getElementById('settings-menu').classList.remove('show');
        }

        // 暂停游戏
        function togglePause() {
            gameState.isPaused = !gameState.isPaused;
            document.getElementById('pause-menu').classList.toggle('show', gameState.isPaused);
            document.getElementById('settings-menu').classList.remove('show');
        }

        // 退出游戏
        function exitGame() {
            if (confirm('确定要退出游戏吗？')) {
                window.location.href = 'index.html';
            }
        }

        // 游戏主循环
        function animate(currentTime) {
            requestAnimationFrame(animate);

            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            if (!gameState.isPaused) {
                updatePlayer();
                updateMobs();
                updateDayNight(deltaTime);
            }

            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 启动游戏
        init();
    </script>
</body>
</html>
