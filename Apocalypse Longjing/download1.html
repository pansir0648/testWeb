    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 页面淡入显示
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
            
            // 页面过渡动画
            const pageTransition = document.getElementById('page-transition');
            setTimeout(() => {
                pageTransition.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => {
                    pageTransition.style.display = 'none';
                }, 500);
            }, 800);
            
            // 显示页面内容
            setTimeout(() => {
                const mainContentElements = document.querySelectorAll('body > *:not(#page-transition)');
                mainContentElements.forEach((element, index) => {
                    setTimeout(() => {
                        element.style.opacity = '1';
                        element.style.transform = 'translateY(0)';
                    }, 100 + (index * 80));
                });
            }, 300);
            
            // 初始化 AOS 动画库
            AOS.init({
                duration: 800,
                once: true,
                offset: 100
            });
            
            // 导航栏滚动效果
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('bg-dark', 'bg-opacity-90', 'backdrop-blur-lg', 'shadow-lg');
                    navbar.classList.remove('bg-transparent');
                } else {
                    navbar.classList.remove('bg-dark', 'bg-opacity-90', 'backdrop-blur-lg', 'shadow-lg');
                    navbar.classList.add('bg-transparent');
                }
            });
            
            // 移动端菜单
            const menuToggle = document.getElementById('menu-toggle');
            const mobileMenu = document.getElementById('mobile-menu');
            
            menuToggle.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
            });
        });
        
        // 下载文件函数
        function downloadFile(filename) {
            // 创建下载链接
            const link = document.createElement('a');
            link.href = filename;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
