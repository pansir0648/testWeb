<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apocalypse Longjing搜索</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6C63FF',
                        secondary: '#4A4AFF',
                        dark: '#1A1A2E',
                        light: '#F5F5F5',
                        accent: '#FF6584'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    },
                    boxShadow: {
                        'custom': '0 10px 30px -5px rgba(108, 99, 255, 0.3)',
                        'hover': '0 20px 40px -5px rgba(108, 99, 255, 0.5)'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient {
                @apply bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary;
            }
            .bg-glass {
                @apply bg-white bg-opacity-10 backdrop-filter backdrop-blur-lg;
            }
            .transition-all-300 {
                @apply transition-all duration-300 ease-in-out;
            }
            .card-hover {
                @apply hover:scale-105 hover:shadow-hover transition-all-300;
            }
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            @apply bg-dark;
        }
        ::-webkit-scrollbar-thumb {
            @apply bg-primary rounded-full;
        }
        ::-webkit-scrollbar-thumb:hover {
            @apply bg-secondary;
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 背景动画 */
        body {
            background-image: url('https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/8ef4a2493f80403dab57747827ed8000~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=202603042009522669BF8AF384B3BF114B&rrcfp=f06b921b&x-expires=1775218235&x-signature=3JxHlhHoH0y%2FPutNlRSLSK38NZo%3D');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(26, 26, 46, 0.7) 100%);
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
        }
        
        /* 搜索框动画 */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .search-container {
            animation: pulse 3s ease-in-out infinite;
        }
        
        /* 搜索引擎图标悬停效果 */
        .engine-icon {
            transition: all 0.3s ease;
        }
        .engine-icon:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-dark text-light font-sans min-h-screen flex items-center justify-center">
    <div class="content w-full max-w-4xl px-4">
        <div class="text-center" data-aos="fade-up">
            <!-- 标题 -->
            <div class="mb-8">
                <h1 class="text-4xl md:text-5xl font-bold text-gradient mb-4">
                    Apocalypse Longjing搜索
                </h1>
                <p class="text-xl text-gray-400">选择搜索引擎进行搜索</p>
            </div>
            
            <!-- 搜索表单 -->
            <div class="search-container max-w-2xl mx-auto mb-12" data-aos="fade-up" data-aos-delay="100">
                <form id="search-form" class="bg-glass p-6 rounded-xl border border-gray-700 shadow-custom">
                    <!-- 搜索引擎选择 -->
                    <div class="flex flex-wrap justify-center gap-4 mb-6" data-aos="fade-up" data-aos-delay="200">
                        <button type="button" class="engine-btn engine-icon w-16 h-16 rounded-full bg-glass flex items-center justify-center text-primary border-2 border-primary" data-engine="baidu">
                        <img src="image/img/baidu.png" width="282" height="282" alt=""/></button>
                        <button type="button" class="engine-btn engine-icon w-16 h-16 rounded-full bg-glass flex items-center justify-center text-blue-400 border-2 border-gray-700" data-engine="bing">
                        <img src="image/img/biying.png" width="334" height="344" alt=""/></button>
                        <button type="button" class="engine-btn engine-icon w-16 h-16 rounded-full bg-glass flex items-center justify-center text-red-500 border-2 border-gray-700" data-engine="360">
                        <img src="image/img/360.png" width="334" height="344" alt=""/></button>

                    </div>
                    
                    <!-- 搜索输入 -->
                    <div class="flex flex-col sm:flex-row gap-2" data-aos="fade-up" data-aos-delay="300">
                        <input type="text" id="search-input" name="q" placeholder="输入搜索内容..." class="flex-1 bg-dark border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-primary transition-all-300">
                        <button type="submit" class="bg-primary hover:bg-secondary text-white px-6 py-3 rounded-lg font-medium transition-all-300">
                            <i class="fa fa-search mr-2"></i>搜索
                        </button>
                    </div>
                    
                    <!-- 隐藏的搜索引擎输入 -->
                    <input type="hidden" id="search-engine" value="baidu">
                </form>
            </div>
            
            <!-- 快捷链接 -->
            <div class="flex flex-wrap justify-center gap-4" data-aos="fade-up" data-aos-delay="400">
                <a href="index.html" class="bg-glass hover:bg-white hover:bg-opacity-20 text-light px-6 py-2 rounded-full transition-all-300">
                    <i class="fa fa-home mr-2"></i>返回首页
                </a>
                <a href="verification.html" class="bg-glass hover:bg-white hover:bg-opacity-20 text-light px-6 py-2 rounded-full transition-all-300">
                    <i class="fa fa-lock mr-2"></i>旧版本进场画面&nbsp;
                </a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // 初始化 AOS 动画库
        AOS.init({
            duration: 800,
            once: true,
            offset: 100
        });
        
        // 搜索引擎配置
        const searchEngines = {
            baidu: {
                url: 'https://www.baidu.com/s',
                param: 'wd'
            },
            bing: {
                url: 'https://www.bing.com/search',
                param: 'q'
            },
            '360': {
                url: 'https://www.so.com/s',
                param: 'q'
            }
        };
        
        // 页面加载动画
        window.addEventListener('DOMContentLoaded', function() {
            // 搜索引擎选择
            const engineBtns = document.querySelectorAll('.engine-btn');
            const searchEngineInput = document.getElementById('search-engine');
            const searchForm = document.getElementById('search-form');
            const searchInput = document.getElementById('search-input');
            
            // 引擎按钮点击事件
            engineBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 移除所有按钮的选中状态
                    engineBtns.forEach(b => {
                        b.classList.remove('border-primary');
                        b.classList.add('border-gray-700');
                    });
                    
                    // 添加当前按钮的选中状态
                    this.classList.remove('border-gray-700');
                    this.classList.add('border-primary');
                    
                    // 更新隐藏输入值
                    searchEngineInput.value = this.dataset.engine;
                });
            });
            
            // 搜索表单提交
            searchForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const engine = searchEngineInput.value;
                const query = searchInput.value.trim();
                
                if (query) {
                    const engineConfig = searchEngines[engine];
                    if (engineConfig) {
                        const url = `${engineConfig.url}?${engineConfig.param}=${encodeURIComponent(query)}`;
                        window.open(url, '_blank');
                    }
                }
            });
            
            // 按回车键搜索
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchForm.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
